name: Release

# Fires ONLY when you manually publish a release on GitHub (Releases → Publish).
# Does NOT trigger on tag push, draft creation, or any automated event.
#
# What this workflow produces per release:
#
#   {repo}-{version}.tar.gz          Source archive
#   {repo}-{version}.tar.gz.sig      Detached SSH signature
#   {repo}-{version}.sha256          SHA-256 checksum
#
# Future artifact slots — add build steps in section 3; signing is automatic.
#
# Required repository secrets:
#   SIGNING_KEY       Private SSH key (ed25519), no passphrase
#   SIGNING_IDENTITY  Email/identifier matching the public key in signing_key.pub

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, and publish release artifacts
    runs-on: ubuntu-latest

    env:
      VERSION:    ${{ github.event.release.tag_name }}
      PROJ:       ${{ github.event.repository.name }}
      SIGNING_NS: ${{ github.event.repository.name }}.release

    steps:

      # ── 1. Checkout the exact tag being released ──────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 1

      # ── 2. Create dist directory ──────────────────────────────────────────────
      - name: Create dist directory
        run: mkdir -p dist

      # ── 3. Build artifacts ────────────────────────────────────────────────────
      # Add project-specific build steps here.
      # Each step should place its output file(s) in dist/.
      # The signing and upload steps handle everything in dist/ automatically.

      - name: Build source tarball
        run: |
          ARCHIVE="dist/${{ env.PROJ }}-${{ env.VERSION }}.tar.gz"
          tar czf "$ARCHIVE" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.pyo' \
            --exclude='dist' \
            --transform "s|^\.|${{ env.PROJ }}-${{ env.VERSION }}|" \
            .
          echo "Archive: $(du -sh $ARCHIVE | cut -f1)"

      # ── 4. Generate checksums ─────────────────────────────────────────────────
      - name: Generate SHA-256 checksums
        working-directory: dist
        run: |
          sha256sum "${{ env.PROJ }}-${{ env.VERSION }}.tar.gz" \
            > "${{ env.PROJ }}-${{ env.VERSION }}.sha256"
          cat "${{ env.PROJ }}-${{ env.VERSION }}.sha256"

      # ── 5. Sign all release artifacts ─────────────────────────────────────────
      - name: Sign artifacts
        env:
          SIGNING_KEY:      ${{ secrets.SIGNING_KEY }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          KEY_FILE=$(mktemp)
          chmod 600 "$KEY_FILE"
          echo "$SIGNING_KEY" > "$KEY_FILE"

          for f in dist/${{ env.PROJ }}-${{ env.VERSION }}.*; do
            case "$f" in
              *.sig|*.sha256) continue ;;
            esac
            echo "Signing: $f"
            ssh-keygen -Y sign -f "$KEY_FILE" -n "${{ env.SIGNING_NS }}" "$f"
          done

          echo "Signing: dist/${{ env.PROJ }}-${{ env.VERSION }}.sha256"
          ssh-keygen -Y sign \
            -f "$KEY_FILE" \
            -n "${{ env.SIGNING_NS }}" \
            "dist/${{ env.PROJ }}-${{ env.VERSION }}.sha256"

          rm -f "$KEY_FILE"
          ls -lh dist/

      # ── 6. Verify signatures before upload ───────────────────────────────────
      - name: Verify signatures
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          PUB=$(cat signing_key.pub)
          ALLOWED=$(mktemp)
          echo "${{ env.SIGNING_IDENTITY }} namespaces=\"${{ env.SIGNING_NS }}\" $PUB" > "$ALLOWED"

          FAIL=0
          for sig in dist/*.sig; do
            artifact="${sig%.sig}"
            echo -n "Verifying $artifact ... "
            if ssh-keygen -Y verify \
                -f "$ALLOWED" \
                -I "${{ env.SIGNING_IDENTITY }}" \
                -n "${{ env.SIGNING_NS }}" \
                -s "$sig" < "$artifact" 2>/dev/null; then
              echo "OK"
            else
              echo "FAILED"
              FAIL=1
            fi
          done
          rm -f "$ALLOWED"

          [ "$FAIL" -eq 0 ] || { echo "Signature verification failed"; exit 1; }
          echo "All signatures verified."

      # ── 7. Upload to GitHub Release ───────────────────────────────────────────
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in dist/*; do
            echo "Uploading: $f"
            gh release upload "${{ env.VERSION }}" "$f" --clobber
          done
